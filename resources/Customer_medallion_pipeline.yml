resources:
  jobs:
    customer_medallion_pipeline:

      name: customer_medallion_pipeline

      tasks:

        - task_key: bronze
          notebook_task:
            notebook_path: Notebooks/bronze_customer.ipynb

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: Notebooks/Silver_customer.ipynb

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: Notebooks/Gold_customer.ipynb

      queue:
        enabled: true
